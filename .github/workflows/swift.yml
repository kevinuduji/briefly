# Builds the Briefly iOS app (Xcode project + SwiftPM), not a standalone Swift package.
name: iOS Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project Briefly.xcodeproj -scheme Briefly

      - name: Build (iOS Simulator)
        run: |
          xcodebuild \
            -project Briefly.xcodeproj \
            -scheme Briefly \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build
